name: Keep Alive

# Runs every 3 days to prevent Supabase from pausing the project
# and to keep the Streamlit app from going to sleep.
on:
  schedule:
    - cron: "0 10 */2 * *"   # 10:00 UTC every 2 days
  workflow_dispatch:           # allow manual trigger from GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:

      - name: Ping Streamlit app (master / public)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            -A "Mozilla/5.0 (keepalive bot)" \
            https://tickeriq.streamlit.app/)
          echo "Streamlit master status: $STATUS"


      - name: Query Supabase — keep project active
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "WARNING: SUPABASE_URL or SUPABASE_ANON_KEY secret not set — skipping Supabase ping"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "$SUPABASE_URL/rest/v1/queries?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY") || {
            echo "WARNING: curl failed (exit $?) — SUPABASE_URL may be malformed or unreachable (should start with https://)"
            exit 0
          }
          echo "Supabase ping status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "WARNING: Supabase returned $STATUS — project may still go inactive!"
          fi
